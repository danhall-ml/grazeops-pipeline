services:
  postgres-db:
    ports: []

  model-registry:
    ports: []

  scheduler:
    ports: []

  calculation-service:
    ports: []

  reviewer-ui:
    profiles: ["ui"]

  smoke-runner:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
    environment:
      CALCULATION_URL: http://calculation-service:8081
      REGISTRY_URL: http://model-registry:8080
      SCHEDULER_URL: http://scheduler:8082
      CALCULATION_DATE: "2024-03-15"
      MODEL_VERSION: "v2"
      CONFIG_VERSION: "default"
      BOUNDARY_CANDIDATES: "boundary_north_paddock_3"
      SMOKE_MAX_WAIT_SECONDS: "60"
      SMOKE_RETRY_SECONDS: "2"
      SMOKE_HTTP_TIMEOUT_SECONDS: "45"
      SMOKE_ENABLE_REPLAY_CHECK: "0"
    depends_on:
      postgres-db:
        condition: service_healthy
      model-registry:
        condition: service_started
      scheduler:
        condition: service_started
      calculation-service:
        condition: service_started
    command: ["python3", "scripts/smoke_stack.py"]
